<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1c1917" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/cignaler_icon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/cignaler_icon.png" />
		<link rel="canonical" href="https://cignaler.github.io/" />

		<!-- Custom Fonts -->
		<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
		<link href="https://fonts.bunny.net/css?family=general-sans:500,600,700|jetbrains-mono:400,500" rel="stylesheet" />

		<!-- Meta Tags -->

		<meta name="keywords" content="CI monitor, GitLab pipeline notifications, desktop CI tool, pipeline watcher, CI/CD notifications macOS, Tauri app" />
		<meta property="og:title" content="Cignaler — Desktop CI Pipeline Monitor for GitLab" />
		<meta property="og:description" content="Get notified only when the builds you care about actually break." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://cignaler.github.io/" />
		<meta property="og:image" content="https://cignaler.github.io/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_US" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Cignaler — Desktop CI Pipeline Monitor for GitLab" />
		<meta name="twitter:description" content="Get notified only when the builds you care about actually break." />
		<meta name="twitter:image" content="https://cignaler.github.io/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
